spring.application.name=citmedconnect

# Supabase PostgreSQL Connection (Transaction mode - port 6543, supports more connections)
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.gorixlsmnsudcgnxfmfm
spring.datasource.password=citmedconnect1122!
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - limit pool size to stay within Supabase free tier limits
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Suppress auto-generated security password (we have our own SecurityConfig)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
